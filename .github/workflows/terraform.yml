name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy App to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Update system
            sudo apt-get update -y

            # Install Node.js (IMPORTANT for Next.js)
            if ! command -v node &> /dev/null
            then
              echo "Installing Node..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Install PM2 (process manager)
            sudo npm install -g pm2

            # Install Git if not present
            if ! command -v git &> /dev/null
            then
              sudo apt-get install -y git
            fi

            cd /home/ubuntu

            # Clone repo first time
            if [ ! -d "doctor-agent" ]; then
              git clone https://github.com/shailesh12417/doctor-agent.git
            fi

            cd doctor-agent

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Install dependencies
            npm install

            # Build project
            npm run build

            # Restart app using PM2
            pm2 delete doctor-app || true
            pm2 start npm --name "doctor-app" -- start

            echo "✅ Deployment completed!"
