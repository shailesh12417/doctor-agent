name: Terraform + Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/terraform # Added directory

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform/terraform # Added directory

      - name: Get EC2 IP
        id: tf_output
        run: |
          # Use the -chdir flag so terraform knows where the files are
          echo "EC2_IP=$(terraform -chdir=./terraform/terraform output -raw instance_public_ip)" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu # Hardcoded as it's standard for Ubuntu AMIs
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying FastAPI..."

            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv git

            cd /home/ubuntu

            # Clone or Refresh repo
            if [ ! -d "doctor-agent" ]; then
              git clone https://github.com/shailesh12417/doctor-agent.git
            fi

            cd doctor-agent
            git fetch origin
            git reset --hard origin/main

            # Setup venv and Install
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Stop old app (using 8000 as specified in your uvicorn command)
            sudo fuser -k 8000/tcp || true

            # Start app in background
            # Note: Ensure your file is actually named main.py
            nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &

            echo "✅ Deployment done"
