name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy App to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (optional)
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Update system
            sudo apt-get update -y

            # Install Docker & Git if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            if ! command -v git &> /dev/null
            then
              echo "Installing Git..."
              sudo apt-get install -y git
            fi

            # Go to home directory
            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "doctor_agent" ]; then
              echo "Cloning repository..."
              git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git doctor_agent
            fi

            cd doctor_agent

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            # Stop and remove old container if exists
            echo "Stopping old container..."
            sudo docker stop doctor-app || true
            sudo docker rm doctor-app || true

            # Remove old image (optional cleanup)
            sudo docker rmi doctor-app || true

            # Build Docker image
            echo "Building Docker image..."
            sudo docker build -t doctor-app .

            # Run container
            echo "Starting container..."
            sudo docker run -d -p 80:80 --name doctor-app doctor-app

            echo "✅ Deployment completed successfully!"
