name: Terraform + Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # If you are using Repository Secrets, you can remove the next line.
    # If you use Environment Secrets, keep it.
    environment: production 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform/terraform

      - name: Get EC2 IP
        id: tf_output
        run: |
          echo "EC2_IP=$(terraform -chdir=./terraform/terraform output -raw instance_public_ip)" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }} # Dynamic IP from Terraform
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying FastAPI..."

            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv git

            cd /home/ubuntu

            if [ ! -d "doctor-agent" ]; then
              git clone https://github.com/shailesh12417/doctor-agent.git
            fi

            cd doctor-agent
            git fetch origin
            git reset --hard origin/main

            # Setup Environment
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Kill old process
            sudo fuser -k 8000/tcp || true

            # Start app with Groq Key injected
            # We use 'export' so the Python process can see the environment variable
            export GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
            nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &

            echo "✅ Deployment done at http://${{ env.EC2_IP }}:8000"
