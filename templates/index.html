<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Doctor Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 800px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4e73df;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2e59d9;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      background: #f8f9fc;
      border-left: 6px solid;
    }

    .low { border-color: green; }
    .medium { border-color: orange; }
    .high { border-color: red; }

    .section {
      margin-top: 20px;
    }

    .warning {
      background: #ffe5e5;
      padding: 12px;
      border-radius: 8px;
      color: red;
      margin-top: 15px;
    }

    .loader {
      text-align: center;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🩺 AI Doctor Assistant</h1>

  <textarea id="symptoms" rows="4" placeholder="Enter your symptoms..."></textarea>
  <button onclick="getDiagnosis()">Analyze</button>

  <div class="loader" id="loader">Analyzing...</div>

  <div id="result"></div>

</div>

<script>
async function getDiagnosis() {

  const symptoms = document.getElementById("symptoms").value;
  const resultDiv = document.getElementById("result");
  const loader = document.getElementById("loader");

  resultDiv.innerHTML = "";
  loader.style.display = "block";

  const response = await fetch("https://doctor-agent-2.onrender.com/ask", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ symptoms })
  });

  const data = await response.json();
  loader.style.display = "none";

  if (data.error) {
    resultDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;
    return;
  }

  let html = `<div class="section"><h2>Possible Conditions</h2>`;

  data.conditions.forEach(c => {
    html += `
      <div class="card ${c.risk.toLowerCase()}">
        <strong>${c.name}</strong><br>
        Probability: ${c.probability}<br>
        Risk: ${c.risk}<br>
        <small>${c.description}</small>
      </div>
    `;
  });

  html += `</div>`;

  html += `
    <div class="section">
      <h2>Advice</h2>
      <p>${data.advice}</p>
    </div>
  `;

  if (data.warning) {
    html += `
      <div class="warning">
        ⚠ ${data.warning}
      </div>
    `;
  }

  resultDiv.innerHTML = html;
}
</script>

</body>
</html>
